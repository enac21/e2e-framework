version: "1"
id: local_loop_test
description: "Self-contained smoke test. Triggers our own Webhook server and verifies the SMS receiver picks it up correctly."
enabled: true
async: false

trigger:
  method: POST
  # Hit our own Webhook Server on port 8081 for the "twilio" extractor
  url: "http://localhost:8081/webhook/twilio"
  headers:
    Content-Type: "application/x-www-form-urlencoded"
  body:
    From: "+123456"
    To: "+987654"
    Body: "{{run_id}}"
#  extract:
#    extracted_from: "test_id"

receivers:
  - type: request
    timeout: 10s
    assertions:
      - type: equals
        field: from
#        value: "{{extracted_from}}"
        value: "+123456"
