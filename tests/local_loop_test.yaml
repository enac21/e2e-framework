version: "1"
id: local_loop_test
description: "A self-contained test that triggers an HTTP request to our own Webhook server and verifies that our own SMS receiver processes it successfully."
enabled: true

trigger:
  method: POST
  # Hit our own Webhook Server on port 8081 for the "twilio" extractor
  url: "http://localhost:8081/webhook/twilio"
  headers:
    Content-Type: "application/x-www-form-urlencoded"
  body:
    From: "+123456"
    To: "+987654"
    # The twilio extractor we built expects the run_id in the body like "ID: <run_id>"
    Body: "{{run_id}}"

receivers:
  - type: sms
    timeout: 10s
    assertions:
      - type: equals
        field: from
        value: "+123456"
